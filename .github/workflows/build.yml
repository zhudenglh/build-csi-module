name: Build mt7915e with CSI
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev zlib1g-dev gawk git gettext \
            libssl-dev xsltproc rsync wget unzip python3 python3-distutils zstd

      - name: Download and extract OpenWrt SDK
        run: |
          wget -q "https://downloads.openwrt.org/releases/24.10.1/targets/mediatek/filogic/openwrt-sdk-24.10.1-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          tar --zstd -xf openwrt-sdk-24.10.1-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          mv openwrt-sdk-24.10.1-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64 sdk

      - name: Prepare mt76 source
        run: |
          cd sdk
          # Update feeds to get mt76 package definition
          ./scripts/feeds update -a
          ./scripts/feeds install kmod-mt7915e

          # Configure
          echo "CONFIG_PACKAGE_kmod-mt7915e=m" >> .config
          make defconfig

          # Prepare mt76 source (download + patch)
          make package/kernel/mt76/prepare V=s 2>&1 | tail -20

      - name: Download and apply CSI patch
        run: |
          cd sdk
          MT76_DIR=$(find build_dir -type d -name "mt76-*" -path "*/package/*" | head -1)
          echo "MT76 source directory: $MT76_DIR"
          ls -la "$MT76_DIR/mt7915/" | head -10

          # Download CSI patch
          wget -q -O /tmp/csi.patch \
            "https://raw.githubusercontent.com/cmonroe/feed-wifi-master/smartrg-master/mt76/patches/1001-wifi-mt76-mt7915-csi-implement-csi-support.patch"

          # Apply patch (may need fuzz for version differences)
          cd "$MT76_DIR"
          patch -p1 --fuzz=5 < /tmp/csi.patch 2>&1 || true

          # Verify key files exist
          echo "=== Checking patch results ==="
          ls -la mt7915/vendor.c mt7915/vendor.h 2>&1
          grep -c "CONFIG_MTK_VENDOR" mt7915/mcu.c || echo "MTK_VENDOR not in mcu.c"
          grep -c "report_csi" mt7915/mcu.c || echo "report_csi not in mcu.c"

          # Ensure CONFIG_MTK_VENDOR is defined in Makefile
          grep "CONFIG_MTK_VENDOR" mt7915/Makefile || echo "Adding CONFIG_MTK_VENDOR to Makefile"
          grep -q "CONFIG_MTK_VENDOR" mt7915/Makefile || \
            sed -i 's/EXTRA_CFLAGS += -DCONFIG_MT76_LEDS/EXTRA_CFLAGS += -DCONFIG_MT76_LEDS -DCONFIG_MTK_VENDOR/' mt7915/Makefile

          # Ensure vendor.o is in the build
          grep "vendor.o" mt7915/Makefile || \
            sed -i 's/mtk_mcu.o$/mtk_mcu.o vendor.o/' mt7915/Makefile

          echo "=== Final Makefile ==="
          cat mt7915/Makefile

      - name: Build mt76
        run: |
          cd sdk
          make package/kernel/mt76/compile V=s -j$(nproc) 2>&1 | tail -30

      - name: Collect modules
        run: |
          mkdir -p output
          find sdk/build_dir -name "mt7915e.ko" -exec cp {} output/ \;
          find sdk/build_dir -name "mt76.ko" -not -path "*/mt76x*" -exec cp {} output/ \;
          find sdk/build_dir -name "mt76-connac-lib.ko" -exec cp {} output/ \;

          echo "=== Built modules ==="
          ls -la output/

          # Verify CSI support
          echo "=== CSI symbols check ==="
          strings output/mt7915e.ko | grep -i "report_csi\|vendor_csi\|csi_list" || echo "WARNING: CSI symbols missing!"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mt76-csi-modules
          path: output/
