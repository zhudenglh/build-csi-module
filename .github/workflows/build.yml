name: Build mt7915e with CSI
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib gettext git libncurses-dev libssl-dev python3-distutils python3-setuptools \
            rsync swig unzip zlib1g-dev file wget zstd

      - name: Clone OpenWrt and setup
        run: |
          git clone --depth 1 --branch v24.10.1 https://github.com/openwrt/openwrt.git
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Configure for mediatek/filogic
          cat > .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_PACKAGE_kmod-mt7915e=m
          EOF
          make defconfig

      - name: Download sources
        run: |
          cd openwrt
          make download -j$(nproc) V=s 2>&1 | tail -10

      - name: Prepare mt76 source and apply CSI patch
        run: |
          cd openwrt
          make package/kernel/mt76/prepare V=s 2>&1 | tail -10

          MT76_DIR=$(find $PWD/build_dir -type f -name "mcu.c" -path "*/mt7915/*" -exec dirname {} \; | head -1 | sed 's|/mt7915$||')
          echo "MT76 source: $MT76_DIR"
          ls "$MT76_DIR/mt7915/"

          cd "$GITHUB_WORKSPACE"
          chmod +x apply_csi_patch.sh
          bash apply_csi_patch.sh "$MT76_DIR"

      - name: Build mt76
        run: |
          cd openwrt
          make package/kernel/mt76/compile V=s -j$(nproc) 2>&1 | tail -50

      - name: Collect and verify modules
        run: |
          mkdir -p output
          echo "=== Searching for ALL .ko files ==="
          find openwrt -name "*.ko" 2>/dev/null | grep -i mt76 || echo "No mt76 .ko found"
          echo "=== Searching ALL ipk files ==="
          find openwrt -name "*.ipk" 2>/dev/null | grep -i mt76 || echo "No mt76 .ipk found"
          echo "=== Check build_dir for mt76 ==="
          find openwrt/build_dir -maxdepth 4 -name "mt76*" -type d 2>/dev/null
          echo "=== Check for compiled .o files ==="
          find openwrt -name "mt7915e.o" -o -name "vendor.o" 2>/dev/null | head -5

          # Copy ko files
          find openwrt -name "mt7915e.ko" -exec cp {} output/ \; 2>/dev/null || true
          find openwrt -name "mt76.ko" -not -path "*/mt76x*" -exec cp {} output/ \; 2>/dev/null || true
          find openwrt -name "mt76-connac-lib.ko" -exec cp {} output/ \; 2>/dev/null || true

          # Also extract from ipk if ko not found directly
          if [ ! -f output/mt7915e.ko ]; then
            IPK=$(find openwrt/bin -name "kmod-mt7915e*.ipk" | head -1)
            if [ -n "$IPK" ]; then
              echo "Extracting from ipk: $IPK"
              cd output && ar x "$IPK" && tar xzf data.tar.gz 2>/dev/null || tar xf data.tar.gz 2>/dev/null
              find . -name "*.ko" -exec mv {} . \; 2>/dev/null
              rm -f debian-binary control.tar.* data.tar.* 2>/dev/null
              cd ..
            fi
          fi

          echo "=== Built modules ==="
          ls -la output/

          echo "=== CSI symbols ==="
          if [ -f output/mt7915e.ko ]; then
            strings output/mt7915e.ko | grep -i "report_csi\|vendor_csi\|csi_list" || echo "No CSI symbols found"
          else
            echo "mt7915e.ko not found!"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mt76-csi-modules
          path: output/
