name: Build mt7915e with CSI
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev zlib1g-dev gawk git gettext \
            libssl-dev xsltproc rsync wget unzip python3 python3-distutils zstd

      - name: Download and extract OpenWrt SDK
        run: |
          wget -q "https://downloads.openwrt.org/releases/24.10.1/targets/mediatek/filogic/openwrt-sdk-24.10.1-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          tar --zstd -xf openwrt-sdk-24.10.1-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          mv openwrt-sdk-24.10.1-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64 sdk

      - name: Prepare mt76 source
        run: |
          cd sdk
          ./scripts/feeds update -a 2>&1 | tail -5
          ./scripts/feeds install kmod-mt7915e 2>&1 | tail -5
          echo "CONFIG_PACKAGE_kmod-mt7915e=m" >> .config
          make defconfig 2>&1 | tail -5
          make package/kernel/mt76/prepare V=s 2>&1 | tail -10

      - name: Apply CSI patch manually
        run: |
          cd sdk
          MT76_DIR=$(find build_dir -type d -name "mt76-*" -path "*/package/*" | head -1)
          echo "MT76 source: $MT76_DIR"
          ls "$MT76_DIR/mt7915/"

          # Download the CSI patch for reference
          wget -q -O /tmp/csi.patch \
            "https://raw.githubusercontent.com/cmonroe/feed-wifi-master/smartrg-master/mt76/patches/1001-wifi-mt76-mt7915-csi-implement-csi-support.patch"

          # Apply only vendor.c and vendor.h (new files, always work)
          cd "$MT76_DIR"
          # Extract and apply just the new files from patch
          patch -p1 --fuzz=10 < /tmp/csi.patch || true

          # Now manually fix the files that failed to patch
          # 1. mt76_connac_mcu.h - add CSI event and command enums
          echo "=== Fixing mt76_connac_mcu.h ==="
          if ! grep -q "MCU_EXT_EVENT_CSI_REPORT" mt76_connac_mcu.h; then
            sed -i '/MCU_EXT_EVENT_MURU_CTRL = 0x9f,/a\\tMCU_EXT_EVENT_CSI_REPORT = 0xc2,' mt76_connac_mcu.h
          fi
          if ! grep -q "MCU_EXT_CMD_CSI_CTRL" mt76_connac_mcu.h; then
            sed -i '/MCU_EXT_CMD_WF_RF_PIN_CTRL = 0xbd,/a\\tMCU_EXT_CMD_CSI_CTRL = 0xc2,' mt76_connac_mcu.h
          fi

          # 2. mt7915/Makefile - add CONFIG_MTK_VENDOR and vendor.o
          echo "=== Fixing mt7915/Makefile ==="
          if ! grep -q "CONFIG_MTK_VENDOR" mt7915/Makefile; then
            sed -i 's/EXTRA_CFLAGS += -DCONFIG_MT76_LEDS/EXTRA_CFLAGS += -DCONFIG_MT76_LEDS -DCONFIG_MTK_VENDOR/' mt7915/Makefile
          fi
          if ! grep -q "vendor.o" mt7915/Makefile; then
            sed -i 's/mtk_mcu.o$/mtk_mcu.o vendor.o/' mt7915/Makefile
          fi

          # 3. mt7915/mcu.c - add CSI event handler
          echo "=== Fixing mt7915/mcu.c ==="
          MCU_C="mt7915/mcu.c"

          # Add forward declaration after MODULE_PARM_DESC
          if ! grep -q "mt7915_mcu_report_csi" "$MCU_C"; then
            sed -i '/MODULE_PARM_DESC.*sr_scene_detect/a\\n#ifdef CONFIG_MTK_VENDOR\nstatic int mt7915_mcu_report_csi(struct mt7915_dev *dev, struct sk_buff *skb);\n#endif' "$MCU_C"
          fi

          # Add case in event switch (after FW_LOG_2_HOST case)
          if ! grep -q "MCU_EXT_EVENT_CSI_REPORT" "$MCU_C"; then
            sed -i '/mt7915_mcu_rx_log_message(dev, skb);/{n;s/break;/break;\n#ifdef CONFIG_MTK_VENDOR\n\tcase MCU_EXT_EVENT_CSI_REPORT:\n\t\tmt7915_mcu_report_csi(dev, skb);\n\t\tbreak;\n#endif/}' "$MCU_C"
          fi

          # 4. mt7915/mcu.h - add CSI structures
          echo "=== Fixing mt7915/mcu.h ==="
          if ! grep -q "mt7915_mcu_csi" mt7915/mcu.h; then
            cat >> mt7915/mcu.h << 'MCUH'

#ifdef CONFIG_MTK_VENDOR
struct mt7915_mcu_csi {
	u8 band;
	u8 mode;
	u8 cfg;
	u8 v1;
	__le32 v2;
	u8 mac_addr[6];
	u8 _rsv[34];
} __packed;

struct csi_tlv {
	__le32 tag;
	__le32 len;
} __packed;

struct mt7915_mcu_csi_report {
	struct csi_tlv _t0;
	__le32 ver;
	struct csi_tlv _t1;
	__le32 ch_bw;
	struct csi_tlv _t2;
	__le32 rssi;
	struct csi_tlv _t3;
	__le32 snr;
	struct csi_tlv _t4;
	__le32 band;
	struct csi_tlv _t5;
	__le32 data_num;
	struct csi_tlv _t6;
	__le16 data_i[CSI_BW80_DATA_COUNT];
	struct csi_tlv _t7;
	__le16 data_q[CSI_BW80_DATA_COUNT];
	struct csi_tlv _t8;
	__le32 ts;
	struct csi_tlv _t9;
	__le32 data_bw;
	struct csi_tlv _t10;
	__le32 pri_ch_idx;
	struct csi_tlv _t11;
	u8 ta[8];
	struct csi_tlv _t12;
	__le32 info;
	struct csi_tlv _t13;
	__le32 rx_mode;
	struct csi_tlv _t14;
	__le32 h_idx;
	struct csi_tlv _t15;
	__le32 trx_idx;
	struct csi_tlv _t16;
	__le32 segment_num;
} __packed;
#endif
MCUH
          fi

          # 5. mt7915/mt7915.h - add CSI data structures and phy fields
          echo "=== Fixing mt7915/mt7915.h ==="
          if ! grep -q "csi_data" mt7915/mt7915.h; then
            cat >> mt7915/mt7915.h << 'MT7915H'

#ifdef CONFIG_MTK_VENDOR
#define CSI_BW20_DATA_COUNT 64
#define CSI_BW40_DATA_COUNT 128
#define CSI_BW80_DATA_COUNT 256
#define CSI_MAX_BUF_NUM 3000

struct csi_data {
	u8 ch_bw;
	u16 data_num;
	s16 data_i[CSI_BW80_DATA_COUNT];
	s16 data_q[CSI_BW80_DATA_COUNT];
	u8 band;
	s8 rssi;
	u8 snr;
	u32 ts;
	u8 data_bw;
	u8 pri_ch_idx;
	u8 ta[ETH_ALEN];
	u32 info;
	u8 rx_mode;
	u32 h_idx;
	u16 tx_idx;
	u16 rx_idx;
	u32 segment_num;
	struct list_head node;
};

struct csi_info {
	struct list_head csi_list;
	spinlock_t csi_lock;
	u32 count;
	bool enable;
	u32 interval;
	u32 last_record;
};

int mt7915_mcu_set_csi(struct mt7915_phy *phy, u8 mode,
		       u8 cfg, u8 v1, u32 v2, u8 *mac_addr);
void mt7915_vendor_register(struct mt7915_phy *phy);
#endif
MT7915H
          fi

          # Now append mt7915_mcu_set_csi and mt7915_mcu_report_csi to mcu.c
          if ! grep -q "mt7915_mcu_set_csi" "$MCU_C" | grep -q "struct mt7915_mcu_csi req"; then
            cat >> "$MCU_C" << 'MCUC'

#ifdef CONFIG_MTK_VENDOR
int mt7915_mcu_set_csi(struct mt7915_phy *phy, u8 mode,
			u8 cfg, u8 v1, u32 v2, u8 *mac_addr)
{
	struct mt7915_dev *dev = phy->dev;
	struct mt7915_mcu_csi req = {
		.band = phy != &dev->phy,
		.mode = mode,
		.cfg = cfg,
		.v1 = v1,
		.v2 = cpu_to_le32(v2),
	};

	if (mac_addr && is_valid_ether_addr(mac_addr))
		ether_addr_copy(req.mac_addr, mac_addr);

	return mt76_mcu_send_msg(&dev->mt76, MCU_EXT_CMD(CSI_CTRL), &req,
				 sizeof(req), false);
}

static int
mt7915_mcu_report_csi(struct mt7915_dev *dev, struct sk_buff *skb)
{
	struct mt76_connac2_mcu_rxd *rxd = (struct mt76_connac2_mcu_rxd *)skb->data;
	struct mt7915_phy *phy = &dev->phy;
	struct mt7915_mcu_csi_report *cr;
	struct csi_data *csi;
	int len, i;

	skb_pull(skb, sizeof(struct mt76_connac2_mcu_rxd));

	len = le16_to_cpu(rxd->len) - sizeof(struct mt76_connac2_mcu_rxd) + 24;
	if (len < sizeof(*cr))
		return -EINVAL;

	cr = (struct mt7915_mcu_csi_report *)skb->data;

	if (phy->csi.interval &&
	    le32_to_cpu(cr->ts) < phy->csi.last_record + phy->csi.interval)
		return 0;

	csi = kzalloc(sizeof(*csi), GFP_KERNEL);
	if (!csi)
		return -ENOMEM;

#define SET_CSI_DATA(_field) csi->_field = le32_to_cpu(cr->_field)
	SET_CSI_DATA(ch_bw);
	SET_CSI_DATA(rssi);
	SET_CSI_DATA(snr);
	SET_CSI_DATA(data_num);
	SET_CSI_DATA(data_bw);
	SET_CSI_DATA(pri_ch_idx);
	SET_CSI_DATA(info);
	SET_CSI_DATA(rx_mode);
	SET_CSI_DATA(h_idx);
	SET_CSI_DATA(ts);
	SET_CSI_DATA(band);
	if (csi->band && !phy->mt76->band_idx)
		phy = mt7915_ext_phy(dev);
#undef SET_CSI_DATA

	for (i = 0; i < csi->data_num; i++) {
		csi->data_i[i] = le16_to_cpu(cr->data_i[i]);
		csi->data_q[i] = le16_to_cpu(cr->data_q[i]);
	}

	memcpy(csi->ta, cr->ta, ETH_ALEN);
	csi->tx_idx = le32_get_bits(cr->trx_idx, GENMASK(31, 16));
	csi->rx_idx = le32_get_bits(cr->trx_idx, GENMASK(15, 0));

	INIT_LIST_HEAD(&csi->node);
	spin_lock_bh(&phy->csi.csi_lock);

	if (!phy->csi.enable) {
		kfree(csi);
		spin_unlock_bh(&phy->csi.csi_lock);
		return 0;
	}

	list_add_tail(&csi->node, &phy->csi.csi_list);
	phy->csi.count++;

	if (phy->csi.count > CSI_MAX_BUF_NUM) {
		struct csi_data *old;
		old = list_first_entry(&phy->csi.csi_list, struct csi_data, node);
		list_del(&old->node);
		kfree(old);
		phy->csi.count--;
	}

	if (csi->h_idx & BIT(15))
		phy->csi.last_record = csi->ts;
	spin_unlock_bh(&phy->csi.csi_lock);

	return 0;
}
#endif
MCUC
          fi

          # 6. mt7915/init.c - add CSI init/cleanup
          echo "=== Fixing mt7915/init.c ==="
          INIT_C="mt7915/init.c"
          if ! grep -q "csi_list" "$INIT_C"; then
            # Add init before mt76_register_device
            sed -i '/ret = mt76_register_device/i\\n#ifdef CONFIG_MTK_VENDOR\n\tINIT_LIST_HEAD(\&dev->phy.csi.csi_list);\n\tspin_lock_init(\&dev->phy.csi.csi_lock);\n\tmt7915_vendor_register(\&dev->phy);\n#endif\n' "$INIT_C"
          fi

          echo "=== Verification ==="
          grep -c "CONFIG_MTK_VENDOR" mt7915/mcu.c mt7915/Makefile mt7915/init.c mt7915/mt7915.h mt7915/mcu.h
          grep "report_csi" mt7915/mcu.c | head -3
          grep "vendor.o" mt7915/Makefile
          ls -la mt7915/vendor.c mt7915/vendor.h

      - name: Build mt76
        run: |
          cd sdk
          make package/kernel/mt76/compile V=s -j$(nproc) 2>&1 | tail -50

      - name: Collect and verify modules
        run: |
          mkdir -p output
          find sdk/build_dir -name "mt7915e.ko" -exec cp {} output/ \;
          find sdk/build_dir -name "mt76.ko" -not -path "*/mt76x*" -exec cp {} output/ \;
          find sdk/build_dir -name "mt76-connac-lib.ko" -exec cp {} output/ \;

          echo "=== Built modules ==="
          ls -la output/

          echo "=== CSI symbols ==="
          strings output/mt7915e.ko | grep -i "report_csi\|vendor_csi\|csi_list\|CSI_REPORT"
          echo "=== Done ==="

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mt76-csi-modules
          path: output/
